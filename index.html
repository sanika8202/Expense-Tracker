<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Expense Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6cfc;
    --accent2: #fc6cc8;
    --accent3: #6cfcd8;
    --text: #f0effe;
    --muted: #7a7a9a;
    --success: #4ade80;
    --error: #f87171;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
 
  /* Animated background blobs */
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(124,108,252,0.15) 0%, transparent 70%);
    top: -100px; left: -100px;
    border-radius: 50%;
    animation: blob1 8s ease-in-out infinite;
    pointer-events: none;
  }
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(252,108,200,0.1) 0%, transparent 70%);
    bottom: -100px; right: -100px;
    border-radius: 50%;
    animation: blob2 10s ease-in-out infinite;
    pointer-events: none;
  }
 
  @keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(60px,40px) scale(1.1)} }
  @keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-40px,-60px) scale(1.15)} }
 
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 36px 40px;
    width: 100%;
    max-width: 440px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px rgba(124,108,252,0.08), 0 40px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  /* ── TOP BAR ── */
  .top-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 28px;
  }
 
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
  }
 
  .logo-icon {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }
 
  .logo-name {
    font-family: 'Syne', sans-serif;
    font-size: 18px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text) 60%, var(--accent));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
 
  .top-right {
    display: flex;
    align-items: center;
    gap: 6px;
  }
 
  .header-user {
    font-size: 12px;
    color: var(--accent3);
    font-weight: 500;
    margin-right: 4px;
  }
 
  .btn-logout {
    padding: 7px 13px;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.2);
    border-radius: 9px;
    color: #f87171;
    font-family: 'DM Sans', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(248,113,113,0.2); }
 
  /* ── SUBTITLE ── */
  .subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 28px;
    margin-top: -4px;
  }
 
  /* ── FORM FIELDS ── */
  .field {
    margin-bottom: 16px;
  }
 
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
 
  input, select {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
    -webkit-appearance: none;
  }
 
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(124,108,252,0.15);
  }
 
  input::placeholder { color: var(--muted); }
 
  select option {
    background: var(--surface2);
    color: var(--text);
  }
 
  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }
 
  /* ── ADD BUTTON ── */
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), #9c6cfc);
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    letter-spacing: 0.02em;
  }
 
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(124,108,252,0.4);
  }
 
  .btn-primary:active { transform: translateY(0); opacity: 0.9; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
 
  /* ── DIVIDER ── */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 20px 0;
    color: var(--muted);
    font-size: 12px;
  }
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
 
  /* ── NAV BUTTONS GRID ── */
  .btn-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
 
  .btn-nav {
    padding: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: border-color 0.2s, background 0.2s, transform 0.15s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
  }
 
  .btn-nav:hover {
    border-color: var(--accent);
    background: rgba(124,108,252,0.08);
    transform: translateY(-1px);
  }
 
  .btn-nav.ai {
    border-color: rgba(252,108,200,0.3);
    color: var(--accent2);
  }
  .btn-nav.ai:hover {
    border-color: var(--accent2);
    background: rgba(252,108,200,0.08);
  }
 
  .btn-nav.budget {
    border-color: rgba(108,252,216,0.3);
    color: var(--accent3);
  }
  .btn-nav.budget:hover {
    border-color: var(--accent3);
    background: rgba(108,252,216,0.08);
  }
 
  /* ── MESSAGE ── */
  #message {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    min-height: 20px;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }
 
  .msg-success {
    display: block !important;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    color: var(--success);
  }
 
  .msg-error {
    display: block !important;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--error);
  }
</style>
</head>
<body>
 
<div class="card">
 
  <!-- TOP BAR -->
  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">💸</div>
      <div class="logo-name">ExpenseAI</div>
    </div>
    <div class="top-right">
      <span class="header-user" id="headerUser"></span>
      <button class="btn-logout" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>
 
  <p class="subtitle">Track smarter. Spend wiser.</p>
 
  <!-- EXPENSE FORM -->
  <div class="field">
    <label>Expense Title</label>
    <input type="text" id="title" placeholder="e.g. Dinner at restaurant">
  </div>
 
  <div class="row">
    <div class="field">
      <label>Amount (₹)</label>
      <input type="number" id="amount" placeholder="0.00" min="0">
    </div>
    <div class="field">
      <label>Date</label>
      <input type="date" id="date">
    </div>
  </div>
 
  <div class="field">
    <label>Category</label>
    <select id="category">
      <option value="">Select category…</option>
      <option value="Food">🍔  Food</option>
      <option value="Travel">✈️  Travel</option>
      <option value="Shopping">🛍️  Shopping</option>
      <option value="Bills">📄  Bills</option>
      <option value="Entertainment">🎮  Entertainment</option>
    </select>
  </div>
 
  <button class="btn-primary" id="addBtn" onclick="addExpense()">
    + Add Expense
  </button>
 
  <div class="divider">navigate</div>
 
  <!-- NAV BUTTONS -->
  <div class="btn-grid">
    <button class="btn-nav" onclick="window.location.href='dashboard.html'">
      📊 Dashboard
    </button>
    <button class="btn-nav ai" onclick="window.location.href='AIAdvice.html'">
      🤖 AI Advice
    </button>
    <button class="btn-nav budget" onclick="window.location.href='budget.html'">
      🎯 Set Budget
    </button>
    <button class="btn-nav" onclick="window.location.href='dashboard.html'">
      📋 View All
    </button>
  </div>
 
  <div id="message"></div>
</div>
 
<script>
  // ── ON LOAD ──
  window.onload = function () {
    // Login guard
    const user = sessionStorage.getItem('userName');
    if (!user) { window.location.href = 'login.html'; return; }
 
    document.getElementById('headerUser').textContent = 'Hi, ' + user + ' 👋';
    document.getElementById('date').valueAsDate = new Date();
  };
 
  // ── ADD EXPENSE ──
  function addExpense() {
    const title    = document.getElementById('title').value.trim();
    const amount   = document.getElementById('amount').value.trim();
    const date     = document.getElementById('date').value;
    const category = document.getElementById('category').value;
    const msg      = document.getElementById('message');
    const btn      = document.getElementById('addBtn');
 
    // Validation
    if (!title) {
      showMsg('error', '⚠️ Please enter an expense title'); return;
    }
    if (!amount || parseFloat(amount) <= 0) {
      showMsg('error', '⚠️ Please enter a valid amount'); return;
    }
    if (!date) {
      showMsg('error', '⚠️ Please select a date'); return;
    }
    if (!category) {
      showMsg('error', '⚠️ Please select a category'); return;
    }
 
    btn.textContent = 'Adding…';
    btn.disabled = true;
 
    const expenseData = { title, amount: parseFloat(amount), category, date };
 
    fetch('AddExpenseServlet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(expenseData)
    })
    .then(r => r.text())
    .then(result => {
      if (result.toLowerCase().includes('successfully') ||
          result.toLowerCase().includes('added')) {
        showMsg('success', '✓ Expense added successfully!');
        // Reset form
        document.getElementById('title').value    = '';
        document.getElementById('amount').value   = '';
        document.getElementById('category').value = '';
        document.getElementById('date').valueAsDate = new Date();
      } else {
        showMsg('error', '✗ ' + result);
      }
      btn.textContent = '+ Add Expense';
      btn.disabled = false;
    })
    .catch(() => {
      showMsg('error', '✗ Connection error. Try again.');
      btn.textContent = '+ Add Expense';
      btn.disabled = false;
    });
  }
 
  function showMsg(type, text) {
    const msg = document.getElementById('message');
    msg.className = type === 'success' ? 'msg-success' : 'msg-error';
    msg.textContent = text;
    if (type === 'success') {
      setTimeout(() => { msg.textContent = ''; msg.className = ''; }, 3000);
    }
  }
 
  // ── LOGOUT ──
  function doLogout() {
    sessionStorage.clear();
    fetch('LogoutServlet').finally(() => { window.location.href = 'login.html'; });
  }
</script>
 
</body>
</html>
