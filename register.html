<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Register — ExpenseAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --accent: #7c6cfc;
    --accent2: #fc6cc8;
    --accent3: #6cfcd8;
    --text: #f0effe;
    --muted: #7a7a9a;
    --success: #4ade80;
    --error: #f87171;
  }
 
  * { margin: 0; padding: 0; box-sizing: border-box; }
 
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
 
  body::before {
    content: '';
    position: fixed;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(252,108,200,0.12) 0%, transparent 70%);
    top: -100px; right: -100px;
    border-radius: 50%;
    animation: blob1 9s ease-in-out infinite;
    pointer-events: none;
  }
 
  body::after {
    content: '';
    position: fixed;
    width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(108,252,216,0.08) 0%, transparent 70%);
    bottom: -100px; left: -100px;
    border-radius: 50%;
    animation: blob2 11s ease-in-out infinite;
    pointer-events: none;
  }
 
  @keyframes blob1 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(-50px,40px) scale(1.1)} }
  @keyframes blob2 { 0%,100%{transform:translate(0,0) scale(1)} 50%{transform:translate(40px,-50px) scale(1.15)} }
 
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 44px 40px;
    width: 420px;
    position: relative;
    z-index: 1;
    box-shadow: 0 0 80px rgba(252,108,200,0.06), 0 40px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
 
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(40px); }
    to   { opacity: 1; transform: translateY(0); }
  }
 
  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 28px;
  }
 
  .logo-icon {
    width: 40px; height: 40px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 12px;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
 
  .logo-text h1 {
    font-family: 'Syne', sans-serif;
    font-size: 20px;
    font-weight: 800;
    background: linear-gradient(135deg, var(--text) 60%, var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
 
  .logo-text p {
    font-size: 12px;
    color: var(--muted);
  }
 
  .page-title {
    font-family: 'Syne', sans-serif;
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -0.5px;
    margin-bottom: 6px;
  }
 
  .page-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 32px;
  }
 
  .field {
    margin-bottom: 16px;
  }
 
  label {
    display: block;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 6px;
  }
 
  input {
    width: 100%;
    padding: 12px 16px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    transition: border-color 0.2s, box-shadow 0.2s;
    outline: none;
  }
 
  input:focus {
    border-color: var(--accent2);
    box-shadow: 0 0 0 3px rgba(252,108,200,0.12);
  }
 
  input::placeholder { color: var(--muted); }
 
  .btn-primary {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    border: none;
    border-radius: 12px;
    color: white;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 8px;
    transition: transform 0.15s, box-shadow 0.15s;
    letter-spacing: 0.02em;
  }
 
  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(252,108,200,0.35);
  }
 
  .btn-primary:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none;
  }
 
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 24px 0;
    color: var(--muted);
    font-size: 12px;
  }
 
  .divider::before, .divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }
 
  .login-link {
    text-align: center;
    font-size: 13px;
    color: var(--muted);
  }
 
  .login-link a {
    color: var(--accent);
    text-decoration: none;
    font-weight: 600;
    transition: color 0.2s;
  }
 
  .login-link a:hover { color: var(--accent2); }
 
  #message {
    margin-top: 16px;
    text-align: center;
    font-size: 13px;
    font-weight: 500;
    min-height: 20px;
    padding: 10px;
    border-radius: 8px;
    display: none;
  }
 
  .msg-success {
    display: block !important;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.2);
    color: var(--success);
  }
 
  .msg-error {
    display: block !important;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.2);
    color: var(--error);
  }
</style>
</head>
<body>
 
<div class="card">
  <div class="logo">
    <div class="logo-icon">💸</div>
    <div class="logo-text">
      <h1>ExpenseAI</h1>
      <p>Smart Finance Tracker</p>
    </div>
  </div>
 
  <div class="page-title">Create account ✨</div>
  <div class="page-sub">Start tracking your expenses smartly</div>
 
  <div class="field">
    <label>Full Name</label>
    <input type="text" id="name" placeholder="Your full name" required>
  </div>
 
  <div class="field">
    <label>Email Address</label>
    <input type="email" id="email" placeholder="you@example.com" required>
  </div>
 
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="Create a password" required>
  </div>
 
  <div class="field">
    <label>Confirm Password</label>
    <input type="password" id="confirm" placeholder="Repeat your password" required>
  </div>
 
  <button class="btn-primary" onclick="doRegister()" id="regBtn">
    Create Account →
  </button>
 
  <div id="message"></div>
 
  <div class="divider">Already have an account?</div>
 
  <div class="login-link">
    <a href="login.html">Login instead →</a>
  </div>
</div>
 
<script>
  function doRegister() {
    const name     = document.getElementById('name').value.trim();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value.trim();
    const confirm  = document.getElementById('confirm').value.trim();
    const msg      = document.getElementById('message');
    const btn      = document.getElementById('regBtn');
 
    // Validations
    if (!name || !email || !password || !confirm) {
      msg.className = 'msg-error';
      msg.textContent = '⚠️ Please fill all fields';
      return;
    }
 
    if (password !== confirm) {
      msg.className = 'msg-error';
      msg.textContent = '✗ Passwords do not match';
      return;
    }
 
    if (password.length < 6) {
      msg.className = 'msg-error';
      msg.textContent = '✗ Password must be at least 6 characters';
      return;
    }
 
    btn.textContent = 'Creating account…';
    btn.disabled = true;
 
    fetch('RegisterServlet', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, email, password })
    })
    .then(r => r.text())
    .then(result => {
      if (result === 'SUCCESS') {
        msg.className = 'msg-success';
        msg.textContent = '✓ Account created! Redirecting to login…';
        setTimeout(() => window.location.href = 'login.html', 1500);
      } else if (result === 'EMAIL_EXISTS') {
        msg.className = 'msg-error';
        msg.textContent = '✗ Email already registered. Try logging in.';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
      } else {
        msg.className = 'msg-error';
        msg.textContent = '✗ Server error. Try again.';
        btn.textContent = 'Create Account →';
        btn.disabled = false;
      }
    })
    .catch(() => {
      msg.className = 'msg-error';
      msg.textContent = '✗ Connection error';
      btn.textContent = 'Create Account →';
      btn.disabled = false;
    });
  }
 
  // Enter key support
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') doRegister();
  });
</script>
 
</body>
</html>
