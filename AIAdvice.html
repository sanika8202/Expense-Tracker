<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Advice — ExpenseAI</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f; --surface: #12121a; --surface2: #1a1a26;
    --border: #2a2a3a; --accent: #7c6cfc; --accent2: #fc6cc8;
    --accent3: #6cfcd8; --text: #f0effe; --muted: #7a7a9a;
    --success: #4ade80; --error: #f87171;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
  }
  body::before {
    content: ''; position: fixed; width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(252,108,200,0.1) 0%, transparent 70%);
    top: -100px; left: -100px; border-radius: 50%;
    animation: blobA 9s ease-in-out infinite; pointer-events: none;
  }
  body::after {
    content: ''; position: fixed; width: 400px; height: 400px;
    background: radial-gradient(circle, rgba(108,252,216,0.08) 0%, transparent 70%);
    bottom: -100px; right: -100px; border-radius: 50%;
    animation: blobB 12s ease-in-out infinite; pointer-events: none;
  }
  @keyframes blobA { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,30px)} }
  @keyframes blobB { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-40px,-50px)} }
  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 28px; padding: 44px 40px; width: 100%; max-width: 560px;
    position: relative; z-index: 1;
    box-shadow: 0 0 80px rgba(252,108,200,0.06), 0 40px 80px rgba(0,0,0,0.5);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp { from{opacity:0;transform:translateY(32px)} to{opacity:1;transform:translateY(0)} }
  .top-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 32px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon {
    width: 34px; height: 34px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 9px; display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .logo-name {
    font-family: 'Syne', sans-serif; font-size: 17px; font-weight: 800;
    background: linear-gradient(135deg, var(--text), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .top-right { display: flex; gap: 8px; align-items: center; }
  .btn-back {
    padding: 8px 14px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; color: var(--muted); font-family: 'DM Sans', sans-serif;
    font-size: 13px; cursor: pointer; transition: all 0.2s;
  }
  .btn-back:hover { border-color: var(--accent); color: var(--text); }
  .btn-logout {
    padding: 8px 14px; background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.2); border-radius: 10px;
    color: #f87171; font-family: 'DM Sans', sans-serif; font-size: 13px;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-logout:hover { background: rgba(248,113,113,0.2); }
  .ai-header { text-align: center; margin-bottom: 28px; }
  .ai-avatar {
    width: 70px; height: 70px;
    background: linear-gradient(135deg, rgba(124,108,252,0.2), rgba(252,108,200,0.2));
    border: 1px solid rgba(124,108,252,0.3); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 32px; margin: 0 auto 16px; position: relative;
  }
  .ai-avatar::after {
    content: ''; position: absolute; inset: -4px; border-radius: 50%;
    border: 1px solid rgba(124,108,252,0.2);
    animation: pulse 2.5s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0;transform:scale(1.2)} }
  .ai-title {
    font-family: 'Syne', sans-serif; font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
    background: linear-gradient(135deg, var(--accent2), var(--accent));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    margin-bottom: 4px;
  }
  .ai-sub { font-size: 13px; color: var(--muted); }
  .advice-container {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 16px; padding: 24px; min-height: 180px;
    margin-bottom: 24px; position: relative; overflow: hidden;
  }
  .advice-container::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    background: linear-gradient(90deg, var(--accent2), var(--accent), var(--accent3));
  }
  .loading-wrap { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 140px; gap: 14px; }
  .dots { display: flex; gap: 8px; }
  .dots span { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; animation: bounce 1.2s ease-in-out infinite; }
  .dots span:nth-child(2) { animation-delay: 0.2s; background: var(--accent2); }
  .dots span:nth-child(3) { animation-delay: 0.4s; background: var(--accent3); }
  @keyframes bounce { 0%,100%{transform:translateY(0);opacity:0.4} 50%{transform:translateY(-10px);opacity:1} }
  .loading-text { font-size: 13px; color: var(--muted); }
  .tips-list { list-style: none; display: flex; flex-direction: column; gap: 14px; }
  .tip-item { display: flex; gap: 14px; align-items: flex-start; animation: tipIn 0.4s ease both; }
  .tip-item:nth-child(2) { animation-delay: 0.1s; }
  .tip-item:nth-child(3) { animation-delay: 0.2s; }
  @keyframes tipIn { from{opacity:0;transform:translateX(-12px)} to{opacity:1;transform:translateX(0)} }
  .tip-num {
    min-width: 28px; height: 28px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 800;
    flex-shrink: 0; margin-top: 1px;
  }
  .tip-item:nth-child(1) .tip-num { background: rgba(124,108,252,0.2); color: var(--accent); border: 1px solid rgba(124,108,252,0.3); }
  .tip-item:nth-child(2) .tip-num { background: rgba(252,108,200,0.2); color: var(--accent2); border: 1px solid rgba(252,108,200,0.3); }
  .tip-item:nth-child(3) .tip-num { background: rgba(108,252,216,0.2); color: var(--accent3); border: 1px solid rgba(108,252,216,0.3); }
  .tip-text { font-size: 14px; line-height: 1.65; color: var(--text); }
  .error-wrap { text-align: center; padding: 40px 0; color: var(--error); font-size: 14px; }
  .btn-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-refresh {
    padding: 13px; background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 12px; color: white;
    font-family: 'Syne', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-refresh:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(124,108,252,0.35); }
  .btn-dashboard {
    padding: 13px; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; font-weight: 500; cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn-dashboard:hover { border-color: var(--accent3); color: var(--accent3); }
  .powered-by {
    text-align: center; margin-top: 18px; font-size: 11px; color: var(--muted);
    display: flex; align-items: center; justify-content: center; gap: 5px;
  }
  .powered-by span {
    background: rgba(124,108,252,0.12); border: 1px solid rgba(124,108,252,0.2);
    color: var(--accent); padding: 2px 8px; border-radius: 20px; font-size: 11px;
  }
</style>
</head>
<body>
<div class="card">
  <div class="top-bar">
    <div class="logo">
      <div class="logo-icon">💸</div>
      <div class="logo-name">ExpenseAI</div>
    </div>
    <div class="top-right">
      <button class="btn-back" onclick="window.location.href='index.html'">← Home</button>
      <button class="btn-logout" onclick="doLogout()">🚪 Logout</button>
    </div>
  </div>
 
  <div class="ai-header">
    <div class="ai-avatar">🤖</div>
    <div class="ai-title">Financial Advisor</div>
    <div class="ai-sub">Powered by Llama 3.3 · Groq AI</div>
  </div>
 
  <div class="advice-container" id="adviceBox">
    <div class="loading-wrap">
      <div class="dots"><span></span><span></span><span></span></div>
      <div class="loading-text">Analyzing your expenses…</div>
    </div>
  </div>
 
  <div class="btn-row">
    <button class="btn-refresh" onclick="getAdvice()">🔄 Refresh</button>
    <button class="btn-dashboard" onclick="window.location.href='dashboard.html'">📊 Dashboard</button>
  </div>
 
  <div class="powered-by">AI analysis by <span>Groq · Llama 3.3 70B</span></div>
</div>
 
<script>
  window.onload = function() {
    // LOGIN CHECK
    const user = sessionStorage.getItem('userName');
    if (!user) { window.location.href = 'login.html'; return; }
    getAdvice();
  };
 
  function getAdvice() {
    const box = document.getElementById("adviceBox");
    box.innerHTML = `<div class="loading-wrap"><div class="dots"><span></span><span></span><span></span></div><div class="loading-text">Analyzing your expenses…</div></div>`;
 
    fetch("AIAdviceServlet")
      .then(r => r.text())
      .then(result => {
        if (!result.trim()) {
          box.innerHTML = `<div class="error-wrap">⚠️ No advice received. Try refreshing.</div>`;
          return;
        }
        const tips = [];
        result.split('\n').filter(l => l.trim()).forEach(line => {
          const m = line.match(/^\d+\.\s*(.+)/);
          if (m) tips.push(m[1].trim());
        });
        if (tips.length > 0) {
          box.innerHTML = `<ul class="tips-list">${tips.map((t,i) =>
            `<li class="tip-item"><div class="tip-num">${i+1}</div><div class="tip-text">${t}</div></li>`
          ).join('')}</ul>`;
        } else {
          box.innerHTML = `<div style="font-size:14px;line-height:1.7;color:var(--text)">${result.replace(/\n/g,'<br>')}</div>`;
        }
      })
      .catch(err => {
        box.innerHTML = `<div class="error-wrap">❌ Error: ${err.message}</div>`;
      });
  }
 
  function doLogout() {
    sessionStorage.clear();
    fetch('LogoutServlet').finally(() => { window.location.href = 'login.html'; });
  }
</script>
</body>
</html>
